/span><br><span class="line">366</span><br><span class="line">367</span><br><span class="line">368</span><br><span class="line">369</span><br><span class="line">370</span><br><span class="line">371</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#进阶7：子查询</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	含义：出现在其它语句中的select语句，称为子查询或内查询</span></span><br><span class="line"><span class="comment">	外部的查询语句，称为主查询或外查询</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	分类：</span></span><br><span class="line"><span class="comment">		按子查询出现的位置：</span></span><br><span class="line"><span class="comment">			select 后面</span></span><br><span class="line"><span class="comment">				仅标量子查询</span></span><br><span class="line"><span class="comment">			from 后面</span></span><br><span class="line"><span class="comment">				表子查询</span></span><br><span class="line"><span class="comment">			where或having后面※</span></span><br><span class="line"><span class="comment">			√	标量子查询（单行子查询）、</span></span><br><span class="line"><span class="comment">			√	列子查询、</span></span><br><span class="line"><span class="comment">				行子查询（较少）</span></span><br><span class="line"><span class="comment">			exists后面（相关子查询）</span></span><br><span class="line"><span class="comment">				表子查询</span></span><br><span class="line"><span class="comment">		按功能不同或结果集的行列数不同：</span></span><br><span class="line"><span class="comment">			标量子查询或单行子查询（结果只有一行一列）</span></span><br><span class="line"><span class="comment">			列子查询（结果一列多行）</span></span><br><span class="line"><span class="comment">			行子查询（结果有一行多列）</span></span><br><span class="line"><span class="comment">			表子查询（结果集即可，几行几列都行）</span></span><br><span class="line"><span class="comment">			</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#一.where和having后面</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	1.子查询放在小括号内</span></span><br><span class="line"><span class="comment">	2.子查询一般放在条件的右侧</span></span><br><span class="line"><span class="comment">	3.标量子查询：一般搭配着单行操作符使用，如</span></span><br><span class="line"><span class="comment">			&lt; &gt; = &gt;= &lt;= &lt;&gt;</span></span><br><span class="line"><span class="comment">	  列子查询：一般搭配多行操作符使用，如</span></span><br><span class="line"><span class="comment">			in、any/some、all</span></span><br><span class="line"><span class="comment">	4.子查询执行优先于主查询执行，主查询的条件使用了子查询的结果</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="comment">#1.标量子查询（单行子查询）</span></span><br><span class="line"><span class="comment">#案例1：谁的工资比Abel高</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#1&gt;查询Abel的工资</span></span><br><span class="line"><span class="keyword">SELECT</span> salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> last_name = <span class="string">&#x27;Abel&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#2&gt;查询员工信息，满足salary&gt;第一步的结果 </span></span><br><span class="line"><span class="keyword">SELECT</span> *</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> salary &gt; (</span><br><span class="line">	<span class="keyword">SELECT</span> salary</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> last_name = <span class="string">&#x27;Abel&#x27;</span></span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例2：返回job_id与141号员工相同，salary比143号员工多的员工 姓名，job_id和工资</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> job_id</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> employee_id = <span class="number">141</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> employee_id = <span class="number">143</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name,job_id,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> job_id = (</span><br><span class="line">	<span class="keyword">SELECT</span> job_id</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> employee_id = <span class="number">141</span></span><br><span class="line">) <span class="keyword">AND</span> salary&gt;(</span><br><span class="line">	<span class="keyword">SELECT</span> salary</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> employee_id = <span class="number">143</span></span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例3：返回公司工资最少的员工的last_name，job_id，salary</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">MIN</span>(salary)</span><br><span class="line"><span class="keyword">FROM</span> employees;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name,job_id,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> salary = (</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">MIN</span>(salary)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例4：查询最低工资&gt;50号部门最低工资的部门id和其最低工资</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">MIN</span>(salary)</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> department_id = <span class="number">50</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> department_id,<span class="keyword">MIN</span>(salary)</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> department_id</span><br><span class="line"><span class="keyword">HAVING</span> <span class="keyword">MIN</span>(salary)&gt;(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">MIN</span>(salary)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> department_id = <span class="number">50</span></span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#非法使用标量子查询</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> department_id,<span class="keyword">MIN</span>(salary)</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> department_id</span><br><span class="line"><span class="keyword">HAVING</span> <span class="keyword">MIN</span>(salary)&gt;(</span><br><span class="line">	<span class="keyword">SELECT</span> salary<span class="comment">#子查询结果不是一行一列，会语法报错</span></span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> department_id = <span class="number">50</span></span><br><span class="line">);<span class="comment">#错误</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#2.列子查询（多行子查询：一列多行）</span></span><br><span class="line"><span class="comment">#多行操作符：	in/not in	等于列表中的任意一个</span></span><br><span class="line"><span class="comment">#		any/some	和子查询返回的某个值比较（较少）: 如，a&gt;any(...)可以替换为a&gt;min(...)</span></span><br><span class="line"><span class="comment">#		all		和子查询返回的所有值比较</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例1：返回location_id 是1400或1700的部门中所有的员工姓名</span></span><br><span class="line"><span class="keyword">SELECT</span> department_id</span><br><span class="line"><span class="keyword">FROM</span> departments</span><br><span class="line"><span class="keyword">WHERE</span> location_id <span class="keyword">IN</span> (<span class="number">1400</span>,<span class="number">1700</span>);</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> department_id <span class="keyword">IN</span> (</span><br><span class="line">	<span class="keyword">SELECT</span> department_id</span><br><span class="line">	<span class="keyword">FROM</span> departments</span><br><span class="line">	<span class="keyword">WHERE</span> location_id <span class="keyword">IN</span> (<span class="number">1400</span>,<span class="number">1700</span>)</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例2：返回其它工种中比job_id为‘IT_PROG’工种任一工资低的员工的：工号、姓名、job_id以及salary</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#查询job_id 为&#x27;IT_PROG&#x27;部门任一工资</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> job_id = <span class="string">&#x27;IT_PROG&#x27;</span>;</span><br><span class="line"><span class="comment">#然后salary&lt;↑</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,employee_id,job_id,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> salary&lt;<span class="keyword">ANY</span>(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> salary</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> job_id = <span class="string">&#x27;IT_PROG&#x27;</span></span><br><span class="line">)<span class="keyword">AND</span> job_id&lt;&gt;<span class="string">&#x27;IT_PROG&#x27;</span>;</span><br><span class="line"><span class="comment">#或者这样写（不使用any）</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,employee_id,job_id,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> salary&lt;(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> <span class="keyword">MAX</span>(salary)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> job_id = <span class="string">&#x27;IT_PROG&#x27;</span></span><br><span class="line">) <span class="keyword">AND</span> job_id &lt;&gt;<span class="string">&#x27;IT_PROG&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例3：返回其它工种中比job_id为‘IT_PROG’工种任意工资低的员工的：工号、姓名、job_id以及salary</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,employee_id,job_id,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> salary&lt;<span class="keyword">ALL</span>(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> salary</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> job_id = <span class="string">&#x27;IT_PROG&#x27;</span></span><br><span class="line">)<span class="keyword">AND</span> job_id&lt;&gt;<span class="string">&#x27;IT_PROG&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#或这样写</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,employee_id,job_id,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> salary&lt;(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> <span class="keyword">MIN</span>(salary)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> job_id = <span class="string">&#x27;IT_PROG&#x27;</span></span><br><span class="line">) <span class="keyword">AND</span> job_id &lt;&gt;<span class="string">&#x27;IT_PROG&#x27;</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#3.行子查询（结果集：一行多列或多行多列（多行多列较少））</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：查询员工编号最小并且工资最高的员工信息</span></span><br><span class="line"><span class="comment">#行子查询的写法</span></span><br><span class="line"><span class="keyword">SELECT</span> * </span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> (employee_id,salary) = (</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">MIN</span>(employee_id),<span class="keyword">MAX</span>(salary)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#旧的写法</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">MIN</span>(employee_id)</span><br><span class="line"><span class="keyword">FROM</span> employees;</span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">MAX</span>(salary)</span><br><span class="line"><span class="keyword">FROM</span> employees;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> employee_id = (</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">MIN</span>(employee_id)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">)<span class="keyword">AND</span> salary = (</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">MAX</span>(salary)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#二.select后面（仅支持标量子查询）</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：查询每个部门员工个数及部门信息</span></span><br><span class="line"><span class="comment">#me：利用连接查询无法使用分组函数（暂存疑问）</span></span><br><span class="line"><span class="comment">#思考一下查询的逻辑</span></span><br><span class="line"><span class="keyword">SELECT</span> d.*,(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">COUNT</span>(*)</span><br><span class="line">	<span class="keyword">FROM</span> employees e</span><br><span class="line">	<span class="keyword">WHERE</span> e.department_id = d.department_id</span><br><span class="line">) 个数 <span class="keyword">FROM</span> departments d;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例2：查询员工号=102的部门名</span></span><br><span class="line"><span class="keyword">SELECT</span> (</span><br><span class="line">	<span class="keyword">SELECT</span> department_name</span><br><span class="line">	<span class="keyword">FROM</span> departments d</span><br><span class="line">	<span class="keyword">INNER</span> <span class="keyword">JOIN</span> employees e</span><br><span class="line">	<span class="keyword">ON</span> d.department_id = e.department_id</span><br><span class="line">	<span class="keyword">WHERE</span> e.employee_id =<span class="number">102</span></span><br><span class="line">) 部门名;</span><br><span class="line"></span><br><span class="line"><span class="comment">#select 子查询的结果只能是一行一列，否则语法报错</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#三.from后面</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	将我们的子查询结果当做一张表，必须起别名</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="comment">#案例：查询每个部门平均工资的工资等级</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#1.查询每个部门的平均工资</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">AVG</span>(salary),department_id</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> department_id;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> grade_level 工资等级</span><br><span class="line"><span class="comment">#2.进行连接</span></span><br><span class="line"><span class="keyword">SELECT</span> avg_dep.*,g.grade_level </span><br><span class="line"><span class="keyword">FROM</span>(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">AVG</span>(salary) ag,department_id</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">GROUP</span> <span class="keyword">BY</span> department_id</span><br><span class="line">) avg_dep</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> job_grades g</span><br><span class="line"><span class="keyword">ON</span> avg_dep.ag <span class="keyword">BETWEEN</span> lowest_sal <span class="keyword">AND</span> highest_sal;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#四.exists后面（相关子查询）:看查询结果是否有值</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	语法：exists(完整的语句)</span></span><br><span class="line"><span class="comment">	结果：</span></span><br><span class="line"><span class="comment">	1或0</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">EXISTS</span>(<span class="keyword">SELECT</span> employee_id <span class="keyword">FROM</span> employees);</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例1：查询有员工的部门名</span></span><br><span class="line"><span class="keyword">SELECT</span> department_name</span><br><span class="line"><span class="keyword">FROM</span> departments d</span><br><span class="line"><span class="keyword">WHERE</span> <span class="keyword">EXISTS</span>(</span><br><span class="line">	<span class="keyword">SELECT</span> *</span><br><span class="line">	<span class="keyword">FROM</span> employees e</span><br><span class="line">	<span class="keyword">WHERE</span> d.department_id = e.department_id</span><br><span class="line">);</span><br><span class="line"><span class="comment">#用in来实现exists的效果</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> department_name</span><br><span class="line"><span class="keyword">FROM</span> departments d</span><br><span class="line"><span class="keyword">WHERE</span> d.department_id <span class="keyword">IN</span> (</span><br><span class="line">	<span class="keyword">SELECT</span> department_id</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例2：查询没有女朋友的男神信息</span></span><br><span class="line"><span class="comment">#用in的方式</span></span><br><span class="line"><span class="keyword">SELECT</span> bo.*</span><br><span class="line"><span class="keyword">FROM</span> boys bo</span><br><span class="line"><span class="keyword">WHERE</span> bo.id <span class="keyword">NOT</span> <span class="keyword">IN</span> (</span><br><span class="line">	<span class="keyword">SELECT</span> boyfriend_id</span><br><span class="line">	<span class="keyword">FROM</span> beauty</span><br><span class="line">);<span class="comment">#男神都有女朋友</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> bo.*</span><br><span class="line"><span class="keyword">FROM</span> boys bo</span><br><span class="line"><span class="keyword">WHERE</span> <span class="keyword">NOT</span> <span class="keyword">EXISTS</span>(</span><br><span class="line">	<span class="keyword">SELECT</span> *</span><br><span class="line">	<span class="keyword">FROM</span> beauty b</span><br><span class="line">	<span class="keyword">WHERE</span> b.boyfriend_id = bo.id </span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题</span></span><br><span class="line"><span class="comment">#题目1：查询和zlotkey相同部门的员工姓名和工资</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name,salary,department_id</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> department_id = (</span><br><span class="line">	<span class="keyword">SELECT</span> department_id</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> last_name = <span class="string">&#x27;zlotkey&#x27;</span></span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目2：查询工资比平均工资高的员工的员工号、姓名和工资</span></span><br><span class="line"><span class="keyword">SELECT</span> employee_id,last_name,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> salary &gt; (</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">AVG</span>(salary)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目3：查询各部门中比本部门平均工资高的员工号、姓名和工资</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">AVG</span>(salary),department_id</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> department_id;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> employee_id,last_name,salary</span><br><span class="line"><span class="keyword">FROM</span> employees e,(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">AVG</span>(salary) avg_sal,department_id</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">GROUP</span> <span class="keyword">BY</span> department_id</span><br><span class="line">) temp</span><br><span class="line"><span class="keyword">WHERE</span> e.department_id = temp.department_id <span class="comment">#sql92标准</span></span><br><span class="line"><span class="keyword">AND</span> salary &gt; temp.avg_sal;</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目4：查询姓名中包含字母u的员工在相同部门工作的员工的员工号</span></span><br><span class="line"><span class="comment">#me:题目意思是在u员工的所有部门中的员工信息</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> department_id</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> last_name <span class="keyword">LIKE</span> <span class="string">&#x27;%u%&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name,employee_id</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> department_id <span class="keyword">IN</span> (</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> department_id</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> last_name <span class="keyword">LIKE</span> <span class="string">&#x27;%u%&#x27;</span></span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目5：查询部门的location_id 为1700的部门工作的员工的员工号</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> department_id</span><br><span class="line"><span class="keyword">FROM</span> departments</span><br><span class="line"><span class="keyword">WHERE</span> location_id = <span class="number">1700</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> employee_id</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> department_id = <span class="keyword">ANY</span>(</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">DISTINCT</span> department_id</span><br><span class="line">	<span class="keyword">FROM</span> departments</span><br><span class="line"><span class="keyword">WHERE</span> location_id = <span class="number">1700</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目6：查询管理者是K_ing的员工的员工姓名和工资</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> employee_id</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> last_name = <span class="string">&#x27;K_ing&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> manager_id <span class="keyword">IN</span> (</span><br><span class="line">	<span class="keyword">SELECT</span> employee_id</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">	<span class="keyword">WHERE</span> last_name = <span class="string">&#x27;K_ing&#x27;</span></span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目7：查询工资最高的员工的姓名,要求first_name和last_name显示为一列，列名为 姓名</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">CONCAT</span>(last_name,first_name) 姓名</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> salary = (</span><br><span class="line">	<span class="keyword">SELECT</span> <span class="keyword">MAX</span>(salary)</span><br><span class="line">	<span class="keyword">FROM</span> employees</span><br><span class="line">);</span><br></pre></td></tr></table></figure>
