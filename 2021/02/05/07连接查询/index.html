/span><br><span class="line">366</span><br><span class="line">367</span><br><span class="line">368</span><br><span class="line">369</span><br><span class="line">370</span><br><span class="line">371</span><br><span class="line">372</span><br><span class="line">373</span><br><span class="line">374</span><br><span class="line">375</span><br><span class="line">376</span><br><span class="line">377</span><br><span class="line">378</span><br><span class="line">379</span><br><span class="line">380</span><br><span class="line">381</span><br><span class="line">382</span><br><span class="line">383</span><br><span class="line">384</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#进阶6：连接查询</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	含义：又称多表查询，当查询字段来自于多个表时，就会用到连接查询</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	笛卡尔乘积现象：表1 m行		表2 n行		结果m*n行</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	发生原因：没有有效的连接条件</span></span><br><span class="line"><span class="comment">	如何避免：添加有效的连接条件</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	分类：</span></span><br><span class="line"><span class="comment">		1.按年代分类</span></span><br><span class="line"><span class="comment">			sql92标准（仅仅支持内连接）</span></span><br><span class="line"><span class="comment">			sql99标准（推荐）：支持内连接+外连接（除全外连接）</span></span><br><span class="line"><span class="comment">		2.按功能分类</span></span><br><span class="line"><span class="comment">			内连接</span></span><br><span class="line"><span class="comment">				等值连接</span></span><br><span class="line"><span class="comment">				非等值连接</span></span><br><span class="line"><span class="comment">				自连接</span></span><br><span class="line"><span class="comment">			外连接</span></span><br><span class="line"><span class="comment">				左外连接</span></span><br><span class="line"><span class="comment">				右外连接</span></span><br><span class="line"><span class="comment">				全外连接</span></span><br><span class="line"><span class="comment">			交叉连接</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">NAME</span> <span class="keyword">FROM</span> beauty;</span><br><span class="line"><span class="keyword">SELECT</span> boyname <span class="keyword">FROM</span> boys;</span><br><span class="line"><span class="comment">#笛卡尔集</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">NAME</span>,boyname <span class="keyword">FROM</span> boys,beauty;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">NAME</span>,boyname <span class="keyword">FROM</span> boys,beauty</span><br><span class="line"><span class="keyword">WHERE</span> beauty.boyfriend_id = boys.id;</span><br><span class="line"></span><br><span class="line"><span class="comment">#一.sql92标准</span></span><br><span class="line"><span class="comment">#1.等值连接</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	1.多表的等值连接的结果为多表的交集部分</span></span><br><span class="line"><span class="comment">	2.n表连接至少需要n-1个连接条件</span></span><br><span class="line"><span class="comment">	3.多表的顺序没有要求</span></span><br><span class="line"><span class="comment">	4.一般需要为表取别名</span></span><br><span class="line"><span class="comment">	5.可以搭配前面介绍的所有子句使用，如：排序、分组、筛选</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例1：查询女神名和对应男神名</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">NAME</span>,boyname</span><br><span class="line"><span class="keyword">FROM</span> beauty,boys</span><br><span class="line"><span class="keyword">WHERE</span> beauty.boyfriend_id = boys.id;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例2：查询员工名和对应的部门名</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,department_name</span><br><span class="line"><span class="keyword">FROM</span> employees,departments</span><br><span class="line"><span class="keyword">WHERE</span> employees.department_id = departments.department_id;</span><br><span class="line"></span><br><span class="line"><span class="comment">#2.为表起别名（AS 可以省略）</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	提高语句的简洁度</span></span><br><span class="line"><span class="comment">	区分多个重名字段</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	注意：如果为表起了别名，则查询的字段就不能使用原来的表名去限定</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="comment">#查询员工名、工种号、工种名</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name,e.job_id,job_title</span><br><span class="line"><span class="keyword">FROM</span> employees <span class="keyword">AS</span> e,jobs <span class="keyword">AS</span> j</span><br><span class="line"><span class="keyword">WHERE</span> e.job_id = j.job_id;</span><br><span class="line"></span><br><span class="line"><span class="comment">#3.两个表的顺序是否可以调换</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,e.job_id,job_title</span><br><span class="line"><span class="keyword">FROM</span> jobs <span class="keyword">AS</span> j,employees <span class="keyword">AS</span> e</span><br><span class="line"><span class="keyword">WHERE</span> e.job_id = j.job_id;</span><br><span class="line"></span><br><span class="line"><span class="comment">#4.可以加筛选吗？可以的</span></span><br><span class="line"><span class="comment">#案例1：查询有奖金的员工名、部门名</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name,department_name,commission_pct</span><br><span class="line"><span class="keyword">FROM</span> employees e,departments d</span><br><span class="line"><span class="keyword">WHERE</span> e.department_id = d.department_id</span><br><span class="line"><span class="keyword">AND</span> e.commission_pct <span class="keyword">IS</span> <span class="keyword">NOT</span> <span class="literal">NULL</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例2：查询城市中第二个字符为o的部门名和城市名</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> department_name,city</span><br><span class="line"><span class="keyword">FROM</span> departments d,locations l</span><br><span class="line"><span class="keyword">WHERE</span> d.location_id = l.location_id</span><br><span class="line"><span class="keyword">AND</span> city <span class="keyword">LIKE</span> <span class="string">&#x27;_o%&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#5.可以加分组</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例1：查询每个城市的部门个数</span></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">COUNT</span>(*) 个数,city</span><br><span class="line"><span class="keyword">FROM</span> departments d, locations l</span><br><span class="line"><span class="keyword">WHERE</span> d.location_id = l.location_id</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> city;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例2：查询有奖金的每个部门的部门名和部门领导编号和部门的最低工资</span></span><br><span class="line"><span class="keyword">SELECT</span> department_name,d.manager_id,<span class="keyword">MIN</span>(salary)</span><br><span class="line"><span class="keyword">FROM</span> departments d,employees e</span><br><span class="line"><span class="keyword">WHERE</span> d.department_id = e.department_id <span class="keyword">AND</span> commission_pct <span class="keyword">IS</span> <span class="keyword">NOT</span> <span class="literal">NULL</span></span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> department_name,d.manager_id;</span><br><span class="line"></span><br><span class="line"><span class="comment">#select * from departments;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#6.可以加排序</span></span><br><span class="line"><span class="comment">#案例：查询每个工种的工种名和员工个数，并按照员工个数降序</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> job_title,<span class="keyword">COUNT</span>(*)</span><br><span class="line"><span class="keyword">FROM</span> employees e,jobs j</span><br><span class="line"><span class="keyword">WHERE</span> j.job_id = e.job_id</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> job_title</span><br><span class="line"><span class="keyword">ORDER</span> <span class="keyword">BY</span> <span class="keyword">COUNT</span>(*) <span class="keyword">DESC</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> job_title,<span class="keyword">COUNT</span>(*)</span><br><span class="line"><span class="keyword">FROM</span> employees e,jobs j</span><br><span class="line"><span class="keyword">WHERE</span> j.job_id = e.job_id</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> e.job_id</span><br><span class="line"><span class="keyword">ORDER</span> <span class="keyword">BY</span> <span class="keyword">COUNT</span>(*) <span class="keyword">DESC</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#7.三表连接</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：查询员工名、部门名和所在的城市</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,department_name,city</span><br><span class="line"><span class="keyword">FROM</span> employees e,departments d,locations l</span><br><span class="line"><span class="keyword">WHERE</span> d.location_id = l.location_id</span><br><span class="line"><span class="keyword">AND</span> e.department_id = d.department_id</span><br><span class="line"><span class="keyword">AND</span> city <span class="keyword">LIKE</span> <span class="string">&#x27;s%&#x27;</span></span><br><span class="line"><span class="keyword">ORDER</span> <span class="keyword">BY</span> d.department_id;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#2.非等值连接</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例1：查询员工的工资和工资级别</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> job_grades;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> salary,grade_level</span><br><span class="line"><span class="keyword">FROM</span> employees e,job_grades g</span><br><span class="line"><span class="keyword">WHERE</span> salary <span class="keyword">BETWEEN</span> lowest_sal <span class="keyword">AND</span> highest_sal</span><br><span class="line"><span class="keyword">AND</span> g.grade_level = <span class="string">&#x27;A&#x27;</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#3.自连接</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：查询 员工名和上级的名称</span></span><br><span class="line"><span class="keyword">SELECT</span> a.last_name ,b.last_name</span><br><span class="line"><span class="keyword">FROM</span> employees a,employees b</span><br><span class="line"><span class="keyword">WHERE</span> a.manager_id = b.employee_id;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#习题</span></span><br><span class="line"><span class="comment">#题目1：显示员工的最大工资，工资平均值</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">MAX</span>(salary),<span class="keyword">AVG</span>(salary)</span><br><span class="line"><span class="keyword">FROM</span> employees;</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目2;查询员工表的employee_id,job_id,last_name 按department_id 降序，salary 升序</span></span><br><span class="line"><span class="keyword">SELECT</span> employee_id,job_id,last_name,salary</span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">ORDER</span> <span class="keyword">BY</span> department_id <span class="keyword">DESC</span>,salary;</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目3：查询员工表的job_id中包含a和e的，并且a在e的前面</span></span><br><span class="line"><span class="keyword">SELECT</span> job_id </span><br><span class="line"><span class="keyword">FROM</span> employees</span><br><span class="line"><span class="keyword">WHERE</span> job_id <span class="keyword">LIKE</span> <span class="string">&#x27;%a%e%&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#题目4：显示当前日期，以及去前后空格，截取子字符串中的函数</span></span><br><span class="line"><span class="comment">#select new();</span></span><br><span class="line"><span class="comment">#select trim(字符 from &#x27;&#x27;);</span></span><br><span class="line"><span class="comment">#select substr(,[,]);</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#二.sql99标准</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	语法：</span></span><br><span class="line"><span class="comment">		select 查询列表</span></span><br><span class="line"><span class="comment">		from 表名 别名 【连接类型】</span></span><br><span class="line"><span class="comment">		join 表2 别名</span></span><br><span class="line"><span class="comment">		on 连接条件</span></span><br><span class="line"><span class="comment">		【where 筛选条件】</span></span><br><span class="line"><span class="comment">		【group by 字段】</span></span><br><span class="line"><span class="comment">		【having 筛选条件】</span></span><br><span class="line"><span class="comment">		【order by 排序列表】</span></span><br><span class="line"><span class="comment">	分类</span></span><br><span class="line"><span class="comment">	内连接（※）inner</span></span><br><span class="line"><span class="comment">	外连接</span></span><br><span class="line"><span class="comment">		左外（※）left 【outer】</span></span><br><span class="line"><span class="comment">		右外（※）right 【outer】</span></span><br><span class="line"><span class="comment">		全外	  full 【outer】</span></span><br><span class="line"><span class="comment">	交叉连接	cross</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#（一）.内连接</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	语法：</span></span><br><span class="line"><span class="comment">		select 查询列表 </span></span><br><span class="line"><span class="comment">		from 表1 别名</span></span><br><span class="line"><span class="comment">		inner join 表2 别名</span></span><br><span class="line"><span class="comment">		on 连接条件;</span></span><br><span class="line"><span class="comment">		</span></span><br><span class="line"><span class="comment">	分类：</span></span><br><span class="line"><span class="comment">		等值</span></span><br><span class="line"><span class="comment">		非等值</span></span><br><span class="line"><span class="comment">		自连接</span></span><br><span class="line"><span class="comment">	特点：</span></span><br><span class="line"><span class="comment">		1.支持排序、分组、筛选</span></span><br><span class="line"><span class="comment">		2.inner可以省略</span></span><br><span class="line"><span class="comment">		3.筛选条件放在where后面，连接条件放在on后面，提高分离性，便于阅读</span></span><br><span class="line"><span class="comment">		4.inner join连接和sql92语法中的等值连接的效果是一样的，都是查询多表的交集。</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#1.等值连接</span></span><br><span class="line"><span class="comment">#案例1：查询员工名、部门名</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,department_name</span><br><span class="line"><span class="keyword">FROM</span> employees e</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> departments d</span><br><span class="line"><span class="keyword">ON</span> e.department_id = d.department_id;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> last_name,department_name</span><br><span class="line"><span class="keyword">FROM</span> departments d</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> employees e</span><br><span class="line"><span class="keyword">ON</span> e.department_id = d.department_id;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例2：查询名字中包含e的员工名和工种名（添加筛选）</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,job_title</span><br><span class="line"><span class="keyword">FROM</span> employees e</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> jobs j</span><br><span class="line"><span class="keyword">ON</span> e.job_id = j.job_id</span><br><span class="line"><span class="keyword">WHERE</span> e.last_name <span class="keyword">LIKE</span> <span class="string">&#x27;%e%&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例3：查询部门个数&gt;3的城市名和部门个数（分组+筛选）</span></span><br><span class="line"><span class="comment">#1.查询每个城市的部门个数</span></span><br><span class="line"><span class="comment">#2.进一步筛选</span></span><br><span class="line"><span class="keyword">SELECT</span> city,<span class="keyword">COUNT</span>(*) 部门个数</span><br><span class="line"><span class="keyword">FROM</span> departments d</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> locations l</span><br><span class="line"><span class="keyword">ON</span> d.location_id = l.location_id</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> city</span><br><span class="line"><span class="keyword">HAVING</span> <span class="keyword">COUNT</span>(*)&gt;<span class="number">3</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例4：查询哪个部门名的员工个数&gt;3的部门名和员工个数，并按照员工个数降序（添加排序）</span></span><br><span class="line"><span class="keyword">SELECT</span> d.department_name,<span class="keyword">COUNT</span>(*)</span><br><span class="line"><span class="keyword">FROM</span> departments d</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> employees e</span><br><span class="line"><span class="keyword">ON</span> d.department_id = e.department_id</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> e.department_id</span><br><span class="line"><span class="keyword">HAVING</span> <span class="keyword">COUNT</span>(*)&gt;<span class="number">3</span></span><br><span class="line"><span class="keyword">ORDER</span> <span class="keyword">BY</span> <span class="keyword">COUNT</span>(*) <span class="keyword">DESC</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#顺序是有些微区别的。如：A和B有关联，B和C有关联，但是A和C（某条数据）没有关联，顺序不同可能导致数据丢失</span></span><br><span class="line"><span class="comment">#案例5：查询员工名、部门名、工种名，并按部门名降序（三表连接）</span></span><br><span class="line"><span class="keyword">SELECT</span> last_name,department_name,job_id</span><br><span class="line"><span class="keyword">FROM</span> employees e</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> departments d <span class="keyword">ON</span> e.department_id = d.department_id</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> jobs j <span class="keyword">ON</span> e.job_id = j.job_id</span><br><span class="line"><span class="keyword">ORDER</span> <span class="keyword">BY</span> department_name;</span><br><span class="line"></span><br><span class="line"><span class="comment">#2.非等值连接</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：查询员工的工资级别</span></span><br><span class="line"><span class="keyword">SELECT</span> salary,grade_level</span><br><span class="line"><span class="keyword">FROM</span> employees e</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> job_grades j</span><br><span class="line"><span class="keyword">ON</span> e.salary <span class="keyword">BETWEEN</span> j.lowest_sal <span class="keyword">AND</span> j.highest_sal;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：查询每个工资级别的个数&gt;的个数，并按工资级别降序</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">COUNT</span>(*),grade_level</span><br><span class="line"><span class="keyword">FROM</span> employees e</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> job_grades j</span><br><span class="line"><span class="keyword">ON</span> e.salary <span class="keyword">BETWEEN</span> j.lowest_sal <span class="keyword">AND</span> j.highest_sal</span><br><span class="line"><span class="keyword">GROUP</span> <span class="keyword">BY</span> grade_level</span><br><span class="line"><span class="keyword">HAVING</span> <span class="keyword">COUNT</span>(*)&gt;<span class="number">20</span></span><br><span class="line"><span class="keyword">ORDER</span> <span class="keyword">BY</span> grade_level <span class="keyword">DESC</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#3.自连接</span></span><br><span class="line"><span class="comment">#案例：查询员工的名字，上级的名字</span></span><br><span class="line"><span class="keyword">SELECT</span> e.last_name 员工, m.last_name 上级</span><br><span class="line"><span class="keyword">FROM</span> employees e</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> employees m</span><br><span class="line"><span class="keyword">ON</span> e.manager_id = m.employee_id;</span><br><span class="line"><span class="comment">#案例：查询包含字符k的员工的名字，上级的名字</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> e.last_name 员工, m.last_name 上级</span><br><span class="line"><span class="keyword">FROM</span> employees e</span><br><span class="line"><span class="keyword">INNER</span> <span class="keyword">JOIN</span> employees m</span><br><span class="line"><span class="keyword">ON</span> e.manager_id = m.employee_id</span><br><span class="line"><span class="keyword">WHERE</span> e.last_name <span class="keyword">LIKE</span> <span class="string">&#x27;%k%&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#（二）外连接</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	应用场景：一个表中有，一个表中没有</span></span><br><span class="line"><span class="comment">	特点：</span></span><br><span class="line"><span class="comment">		1.外连接的查询结果为主表的所有记录</span></span><br><span class="line"><span class="comment">			如果从表中有和它匹配的，则显示匹配的值</span></span><br><span class="line"><span class="comment">			如果从表中没有和它匹配的，则显示null</span></span><br><span class="line"><span class="comment">			外连接查询结果=内连接结果+主表中有而从表中没有的记录</span></span><br><span class="line"><span class="comment">		2.左外连接，left 左边的是主表</span></span><br><span class="line"><span class="comment">		  右外连接，right join右边是主表</span></span><br><span class="line"><span class="comment">		3.左外和右外交换两个表的顺序，可以实现同样的效果</span></span><br><span class="line"><span class="comment">		4.全外连接=内连接的结果+表1中有但是表2没有的+表2中有表1中没有的</span></span><br><span class="line"><span class="comment">		</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="comment">#引入：查询男生表中没有女神对应男神的女神名</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> beauty;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> boys;</span><br><span class="line"></span><br><span class="line"><span class="comment">#外连接可以当作是分主从表的</span></span><br><span class="line"><span class="comment">#左外连接</span></span><br><span class="line"><span class="keyword">SELECT</span> b.name,bo.*</span><br><span class="line"><span class="keyword">FROM</span> beauty b</span><br><span class="line"><span class="keyword">LEFT</span> <span class="keyword">OUTER</span> <span class="keyword">JOIN</span> boys bo</span><br><span class="line"><span class="keyword">ON</span> b.boyfriend_id = bo.id</span><br><span class="line"><span class="keyword">WHERE</span> bo.id <span class="keyword">IS</span> <span class="literal">NULL</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#右外连接</span></span><br><span class="line"><span class="keyword">SELECT</span> b.name,bo.*</span><br><span class="line"><span class="keyword">FROM</span> boys bo</span><br><span class="line"><span class="keyword">RIGHT</span> <span class="keyword">OUTER</span> <span class="keyword">JOIN</span> beauty b</span><br><span class="line"><span class="keyword">ON</span> b.boyfriend_id = bo.id</span><br><span class="line"><span class="keyword">WHERE</span> bo.id <span class="keyword">IS</span> <span class="literal">NULL</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例1：查询哪个部门没有员工</span></span><br><span class="line"><span class="comment">#左外</span></span><br><span class="line"><span class="keyword">SELECT</span> d.*,e.employee_id</span><br><span class="line"><span class="keyword">FROM</span> departments d</span><br><span class="line"><span class="keyword">LEFT</span> <span class="keyword">OUTER</span> <span class="keyword">JOIN</span> employees e</span><br><span class="line"><span class="keyword">ON</span> d.department_id = e.department_id</span><br><span class="line"><span class="keyword">WHERE</span> e.employee_id <span class="keyword">IS</span> <span class="literal">NULL</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#右外</span></span><br><span class="line"><span class="keyword">SELECT</span> d.*,e.employee_id</span><br><span class="line"><span class="keyword">FROM</span> employees e</span><br><span class="line"><span class="keyword">RIGHT</span> <span class="keyword">OUTER</span> <span class="keyword">JOIN</span> departments d</span><br><span class="line"><span class="keyword">ON</span> d.department_id = e.department_id</span><br><span class="line"><span class="keyword">WHERE</span> e.employee_id <span class="keyword">IS</span> <span class="literal">NULL</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#全外连接(mysql不支持)，可以加上where 关键字 is null 可以实现类似对称差集的结果</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#交叉连接</span></span><br><span class="line"><span class="comment">#实现笛卡尔乘积</span></span><br><span class="line"><span class="keyword">SELECT</span> b.*,bo.*</span><br><span class="line"><span class="keyword">FROM</span> beauty b</span><br><span class="line"><span class="keyword">CROSS</span> <span class="keyword">JOIN</span> boys bo;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#小总结：</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	sql92和sql99</span></span><br><span class="line"><span class="comment">	功能：</span></span><br><span class="line"><span class="comment">		sql99支持的较多</span></span><br><span class="line"><span class="comment">	可读性：</span></span><br><span class="line"><span class="comment">		sql99实现连接条件和筛选条件的分离，可读性较高</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#习题</span></span><br><span class="line"><span class="comment">#习题1：查询编号&gt;3的女神的男友信息，如果有则列出详细信息，如果没有用null填充</span></span><br><span class="line"><span class="keyword">SELECT</span> b.id,b.name,bo.*</span><br><span class="line"><span class="keyword">FROM</span> beauty b</span><br><span class="line"><span class="keyword">LEFT</span> <span class="keyword">OUTER</span> <span class="keyword">JOIN</span> boys bo</span><br><span class="line"><span class="keyword">ON</span> b.boyfriend_id = bo.id</span><br><span class="line"><span class="keyword">WHERE</span> b.id&gt;<span class="number">3</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题2：查询哪些城市没有部门</span></span><br><span class="line"><span class="keyword">SELECT</span> l.city,d.department_id</span><br><span class="line"><span class="keyword">FROM</span> locations l</span><br><span class="line"><span class="keyword">LEFT</span> <span class="keyword">OUTER</span> <span class="keyword">JOIN</span> departments d</span><br><span class="line"><span class="keyword">ON</span> l.location_id = d.location_id</span><br><span class="line"><span class="keyword">WHERE</span> d.department_id <span class="keyword">IS</span> <span class="literal">NULL</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题3：查询部门名为SAL或IT的员工信息</span></span><br><span class="line"><span class="keyword">SELECT</span> e.*,d.department_name</span><br><span class="line"><span class="keyword">FROM</span> departments d</span><br><span class="line"><span class="keyword">LEFT</span> <span class="keyword">OUTER</span> <span class="keyword">JOIN</span> employees e</span><br><span class="line"><span class="keyword">ON</span> d.department_id = e.department_id</span><br><span class="line"><span class="keyword">WHERE</span> d.department_name <span class="keyword">IN</span> (<span class="string">&#x27;SAL&#x27;</span>,<span class="string">&#x27;IT&#x27;</span>);</span><br><span class="line"><span class="comment">#这个表有好几个部门名是IT但是部门编号不一样，所以最后有了null值</span></span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> departments;</span><br></pre></td></tr></table></figure>
