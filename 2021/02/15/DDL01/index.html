ass="line"><span class="comment">	一、库的管理</span></span><br><span class="line"><span class="comment">	创建、修改、删除</span></span><br><span class="line"><span class="comment">	表的管理</span></span><br><span class="line"><span class="comment">	创建、修改、删除</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	创建：create</span></span><br><span class="line"><span class="comment">	修改：alter</span></span><br><span class="line"><span class="comment">	删除：drop</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#一、库的管理</span></span><br><span class="line"><span class="comment">#1、库的创建</span></span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	语法：</span></span><br><span class="line"><span class="comment">		create database 库名;</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：创建库Books</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">DATABASE</span> books;</span><br><span class="line"></span><br><span class="line"><span class="comment">#2.库的修改（基本不进行修改）</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">RENAME</span> <span class="keyword">DATABASE</span> books <span class="keyword">TO</span> 新库名;<span class="comment">#现在已经无效，因为不安全，在更新迭代中被取消</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#更改库的字符集</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">DATABASE</span> books <span class="built_in">CHARACTER</span> <span class="keyword">SET</span> gbk;</span><br><span class="line"></span><br><span class="line"><span class="comment">#3.库的删除</span></span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">DATABASE</span> books;<span class="comment">#删除不存在的库会语法报错</span></span><br><span class="line"><span class="comment">#改进</span></span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">DATABASE</span> <span class="keyword">IF</span> <span class="keyword">EXISTS</span> books;</span><br><span class="line"></span><br><span class="line"><span class="comment">#二、表的管理</span></span><br><span class="line"><span class="comment">#1.表的创建</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	语法：</span></span><br><span class="line"><span class="comment">		create table 表名(</span></span><br><span class="line"><span class="comment">			列名 列的类型【(长度) 约束】,</span></span><br><span class="line"><span class="comment">			...</span></span><br><span class="line"><span class="comment">		)</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：创建Book表</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> <span class="keyword">IF</span> <span class="keyword">NOT</span> <span class="keyword">EXISTS</span> book(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span>,<span class="comment">#编号</span></span><br><span class="line">	price <span class="keyword">DOUBLE</span>,<span class="comment">#价格</span></span><br><span class="line">	authorId <span class="built_in">INT</span>,<span class="comment">#作者编号</span></span><br><span class="line">	publishDate DATETIME<span class="comment">#出版日期</span></span><br><span class="line">);</span><br><span class="line"></span><br><span class="line">DESC book;</span><br><span class="line"></span><br><span class="line"><span class="comment">#案例：创建作者表author</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> author (</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span>,</span><br><span class="line">	au_name <span class="built_in">VARCHAR</span>(<span class="number">20</span>),</span><br><span class="line">	nation <span class="built_in">VARCHAR</span>(<span class="number">10</span>)</span><br><span class="line">);</span><br><span class="line">DESC author;</span><br><span class="line"></span><br><span class="line"><span class="comment">#2.表的修改</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	alter table 表名 add|drop|modify|change column</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="comment">#1.修改列名</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> book <span class="keyword">CHANGE</span> <span class="keyword">COLUMN</span> publishDate pubDate DATETIME;<span class="comment">#必须加类型，column可以省略</span></span><br><span class="line"><span class="comment">#2.修改列的类型或约束</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> book <span class="keyword">MODIFY</span> <span class="keyword">COLUMN</span> pubdate <span class="built_in">TIMESTAMP</span>;<span class="comment">#时间戳</span></span><br><span class="line"><span class="comment">#3.添加列</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> author <span class="keyword">ADD</span> <span class="keyword">COLUMN</span> annual <span class="keyword">DOUBLE</span>;</span><br><span class="line"><span class="comment">#4.删除列</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> author <span class="keyword">DROP</span> <span class="keyword">COLUMN</span> annual;</span><br><span class="line"><span class="comment">#5.修改表名</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> author <span class="keyword">RENAME</span> <span class="keyword">TO</span> book_author;</span><br><span class="line"></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> book_author <span class="keyword">RENAME</span> <span class="keyword">TO</span> author;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#3.表的删除</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">TABLE</span> <span class="keyword">IF</span> <span class="keyword">EXISTS</span> book_author;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SHOW</span> <span class="keyword">TABLES</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#通用的写法</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">DATABASE</span> <span class="keyword">IF</span> <span class="keyword">EXISTS</span> 旧库名;</span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">DATABASE</span> 新库名;</span><br><span class="line"></span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">TABLE</span> <span class="keyword">IF</span> <span class="keyword">EXISTS</span> 旧表名;</span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> 表名();</span><br><span class="line"></span><br><span class="line"><span class="comment">#4.表的复制</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">INSERT</span> <span class="keyword">INTO</span> author <span class="keyword">VALUES</span></span><br><span class="line">(<span class="number">1</span>,<span class="string">&#x27;村上春树&#x27;</span>,<span class="string">&#x27;日本&#x27;</span>),</span><br><span class="line">(<span class="number">2</span>,<span class="string">&#x27;莫言&#x27;</span>,<span class="string">&#x27;中国&#x27;</span>),</span><br><span class="line">(<span class="number">3</span>,<span class="string">&#x27;冯唐&#x27;</span>,<span class="string">&#x27;中国&#x27;</span>),</span><br><span class="line">(<span class="number">4</span>,<span class="string">&#x27;金庸&#x27;</span>,<span class="string">&#x27;中国&#x27;</span>);</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> author;</span><br><span class="line"><span class="comment">#1.仅仅复制表的结构</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> copy <span class="keyword">LIKE</span> author;</span><br><span class="line"></span><br><span class="line"><span class="comment">#2.复制表的结构+数据</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> copy2</span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> author;</span><br><span class="line"></span><br><span class="line"><span class="comment">#只复制部分数据</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> copy3</span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">id</span>,au_name</span><br><span class="line"><span class="keyword">FROM</span> author</span><br><span class="line"><span class="keyword">WHERE</span> <span class="keyword">id</span> =<span class="number">1</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#仅仅复制某些字段</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> copy4</span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">id</span>,au_name</span><br><span class="line"><span class="keyword">FROM</span> author</span><br><span class="line"><span class="keyword">WHERE</span> <span class="number">0</span>;<span class="comment">#给一个恒不成立的条件就可以了</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#习题</span></span><br><span class="line"><span class="comment">#习题1;创建表dept1</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> dept1(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span>(<span class="number">7</span>),</span><br><span class="line">	<span class="keyword">NAME</span> <span class="built_in">VARCHAR</span>(<span class="number">25</span>)</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题2：将表departments中的数据插入到新表中的dept2中</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> dept2</span><br><span class="line"><span class="keyword">SELECT</span> department_id, department_name</span><br><span class="line"><span class="keyword">FROM</span> myemployees.departments;</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题3：创建表emp5</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> emp5(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span>(<span class="number">7</span>),</span><br><span class="line">	First_name <span class="built_in">VARCHAR</span>(<span class="number">25</span>),</span><br><span class="line">	Last_name <span class="built_in">VARCHAR</span>(<span class="number">25</span>),</span><br><span class="line">	Dept_id <span class="built_in">INT</span>(<span class="number">7</span>)</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题4：将Last_name长度增加到50</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> emp5 <span class="keyword">MODIFY</span> <span class="keyword">COLUMN</span> last_name <span class="built_in">VARCHAR</span>(<span class="number">50</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题5：根据employees创建employee2</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> employee2 <span class="keyword">LIKE</span> myemployees.employees;</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题6：删除emp5</span></span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">TABLE</span> <span class="keyword">IF</span> <span class="keyword">EXISTS</span> emp5;</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题7：将employee2重命名为emp5</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> employee2 <span class="keyword">RENAME</span> <span class="keyword">TO</span> emp5;</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题8：在表dept1和emp5中添加新列new_column</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> dept1 <span class="keyword">ADD</span> <span class="keyword">COLUMN</span> new_column <span class="built_in">INT</span>;</span><br><span class="line"><span class="keyword">ALTER</span> <span class="keyword">TABLE</span> emp5 <span class="keyword">ADD</span> <span class="keyword">COLUMN</span> new_column <span class="built_in">INT</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">#习题9：删除emp5中的列 new_column</span></span><br><span class="line"><span class="keyword">ALTER</span> <span class="key
