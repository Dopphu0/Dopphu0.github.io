ss="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br><span class="line">149</span><br><span class="line">150</span><br><span class="line">151</span><br><span class="line">152</span><br><span class="line">153</span><br><span class="line">154</span><br><span class="line">155</span><br><span class="line">156</span><br><span class="line">157</span><br><span class="line">158</span><br><span class="line">159</span><br><span class="line">160</span><br><span class="line">161</span><br><span class="line">162</span><br><span class="line">163</span><br><span class="line">164</span><br><span class="line">165</span><br><span class="line">166</span><br><span class="line">167</span><br><span class="line">168</span><br><span class="line">169</span><br><span class="line">170</span><br><span class="line">171</span><br><span class="line">172</span><br><span class="line">173</span><br><span class="line">174</span><br><span class="line">175</span><br><span class="line">176</span><br><span class="line">177</span><br><span class="line">178</span><br><span class="line">179</span><br><span class="line">180</span><br><span class="line">181</span><br><span class="line">182</span><br><span class="line">183</span><br><span class="line">184</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#常见约束</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	含义：一种限制，用于限制表中的数据，保证表中的数据的准确与可靠性</span></span><br><span class="line"><span class="comment">	分类：六大约束</span></span><br><span class="line"><span class="comment">		not null 非空 用于保证该字段的值不能为空</span></span><br><span class="line"><span class="comment">		default  默认 用于保证该字段有默认值</span></span><br><span class="line"><span class="comment">		primary key 主键约束 用于保证该字段的值具有唯一性，并且非空</span></span><br><span class="line"><span class="comment">		unique 唯一 用于保证该字段的唯一性，可以为空</span></span><br><span class="line"><span class="comment">		check 检查【MySQL不支持】</span></span><br><span class="line"><span class="comment">		foreign key 外键 用于限制两个表的关系，用于保证该字段的值必须来自于主表的关联列的值</span></span><br><span class="line"><span class="comment">			在从表中添加外键约束，用于引用主表中某列的值</span></span><br><span class="line"><span class="comment">			references</span></span><br><span class="line"><span class="comment">			比如员工表中的job_id,department_id</span></span><br><span class="line"><span class="comment">	添加约束的时机：（在添加数据之前）</span></span><br><span class="line"><span class="comment">		1.创建表时</span></span><br><span class="line"><span class="comment">		2.修改表时</span></span><br><span class="line"><span class="comment">	约束添加的分类：</span></span><br><span class="line"><span class="comment">		列级约束</span></span><br><span class="line"><span class="comment">			语法上都支持，但是外键约束、check没有效果</span></span><br><span class="line"><span class="comment">		表级约束</span></span><br><span class="line"><span class="comment">			除去非空和默认</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">	主键和唯一的大对比：</span></span><br><span class="line"><span class="comment">			是否唯一  是否能为空	一个表中可以有多少个  是否允许组合</span></span><br><span class="line"><span class="comment">		主键	√	   ×		至多一个		允许（不推荐）</span></span><br><span class="line"><span class="comment">		唯一	√	   √		可以多个		允许（不推荐）</span></span><br><span class="line"><span class="comment">		insert into major values(1,&#x27;java&#x27;);</span></span><br><span class="line"><span class="comment">		insert into major values(2,&#x27;h5&#x27;);</span></span><br><span class="line"><span class="comment">		insert into stu values(1,&#x27;join&#x27;.&#x27;男&#x27;,null,19,1);</span></span><br><span class="line"><span class="comment">		insert into stu values(2,&#x27;lily&#x27;,&#x27;男&#x27;,null,19,2);#只允许一个为空</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">		组合主键和组合唯一键</span></span><br><span class="line"><span class="comment">		比如，id和stuname组合，两者均相同才会报错</span></span><br><span class="line"><span class="comment">	外键：</span></span><br><span class="line"><span class="comment">		1.要求在从表设置外键关系</span></span><br><span class="line"><span class="comment">		2.从表的外键列和主表的关联列的类型应该一致或兼容,名称无要求</span></span><br><span class="line"><span class="comment">		3.主表的关联列必须是一个key（一般是主键和唯一）</span></span><br><span class="line"><span class="comment">		4.插入数据时，先插入主表后插入从表</span></span><br><span class="line"><span class="comment">		5.删除数据时，先删除从表后删除主表</span></span><br><span class="line"><span class="comment">		create table demo_first(</span></span><br><span class="line"><span class="comment">			id int,</span></span><br><span class="line"><span class="comment">			constraint fk_f_s foreign key(id) references demo_second(s_id)</span></span><br><span class="line"><span class="comment">		);</span></span><br><span class="line"><span class="comment">		drop table demo_first;</span></span><br><span class="line"><span class="comment">		drop table demo_second;</span></span><br><span class="line"><span class="comment">		create table demo_second(</span></span><br><span class="line"><span class="comment">			s_id int not null unique</span></span><br><span class="line"><span class="comment">		);</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> 表名(</span><br><span class="line">	字段名 字段类型 约束,</span><br><span class="line">	...,</span><br><span class="line">	表级约束</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">#一、创建表时添加约束</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	语法：</span></span><br><span class="line"><span class="comment">		直接在字段名和类型后面追加约束类型即可</span></span><br><span class="line"><span class="comment">		只支持：默认、非空、主键、唯一</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">DATABASE</span> students;</span><br><span class="line"><span class="keyword">USE</span> students;</span><br><span class="line"><span class="comment">#1.添加列级约束</span></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> stuinfo(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span> PRIMARY <span class="keyword">KEY</span>,<span class="comment">#主键</span></span><br><span class="line">	stuName <span class="built_in">VARCHAR</span>(<span class="number">20</span>) <span class="keyword">NOT</span> <span class="literal">NULL</span>,<span class="comment">#非空</span></span><br><span class="line">	gender <span class="built_in">CHAR</span>(<span class="number">1</span>) <span class="keyword">CHECK</span>(gender=<span class="string">&#x27;男&#x27;</span> <span class="keyword">OR</span> gender=<span class="string">&#x27;女&#x27;</span>),<span class="comment">#检查</span></span><br><span class="line">	seat <span class="built_in">INT</span> <span class="keyword">UNIQUE</span>,<span class="comment">#唯一</span></span><br><span class="line">	age <span class="built_in">INT</span> <span class="keyword">DEFAULT</span> <span class="number">18</span>,<span class="comment">#默认约束</span></span><br><span class="line">	major_id <span class="built_in">INT</span> <span class="keyword">REFERENCES</span> major(<span class="keyword">id</span>)<span class="comment">#外键</span></span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> major(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span> PRIMARY <span class="keyword">KEY</span>,</span><br><span class="line">	majorName <span class="built_in">VARCHAR</span>(<span class="number">20</span>)</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line">DESC stuinfo;</span><br><span class="line"><span class="comment">#查看表中所有索引，包括：主键、外键、唯一</span></span><br><span class="line"><span class="keyword">SHOW</span> <span class="keyword">INDEX</span> <span class="keyword">FROM</span> stuinfo;</span><br><span class="line"></span><br><span class="line"><span class="comment">#2.添加表级约束</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	语法：</span></span><br><span class="line"><span class="comment">		在各个字段的最下面</span></span><br><span class="line"><span class="comment">		【constraint 约束名】 约束类型(字段名)</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">TABLE</span> <span class="keyword">IF</span> <span class="keyword">EXISTS</span> stuinfo;</span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> stu(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span>,</span><br><span class="line">	stuname <span class="built_in">VARCHAR</span>(<span class="number">20</span>),</span><br><span class="line">	gender <span class="built_in">CHAR</span>(<span class="number">1</span>),</span><br><span class="line">	seat <span class="built_in">INT</span>,</span><br><span class="line">	age <span class="built_in">INT</span>,</span><br><span class="line">	major_id <span class="built_in">INT</span>,</span><br><span class="line">	<span class="keyword">CONSTRAINT</span> pk PRIMARY <span class="keyword">KEY</span>(<span class="keyword">id</span>,stuname),</span><br><span class="line">	<span class="keyword">CONSTRAINT</span> uq <span class="keyword">UNIQUE</span>(seat),</span><br><span class="line">	<span class="keyword">CONSTRAINT</span> ck <span class="keyword">CHECK</span>(gender=<span class="string">&#x27;男&#x27;</span> <span class="keyword">OR</span> gender=<span class="string">&#x27;女&#x27;</span>),</span><br><span class="line">	<span class="keyword">CONSTRAINT</span> fk_stuinfo_major <span class="keyword">FOREIGN</span> <span class="keyword">KEY</span>(major_id) <span class="keyword">REFERENCES</span> major(<span class="keyword">id</span>)</span><br><span class="line">);</span><br><span class="line"><span class="keyword">SHOW</span> <span class="keyword">INDEX</span> <span class="keyword">FROM</span> stu; </span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> stu(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span>,</span><br><span class="line">	stuname <span class="built_in">VARCHAR</span>(<span class="number">20</span>),</span><br><span class="line">	gender <span class="built_in">CHAR</span>(<span class="number">1</span>),</span><br><span class="line">	seat <span class="built_in">INT</span>,</span><br><span class="line">	age <span class="built_in">INT</span>,</span><br><span class="line">	major_id <span class="built_in">INT</span>,</span><br><span class="line">	PRIMARY <span class="keyword">KEY</span>(<span class="keyword">id</span>),</span><br><span class="line">	<span class="keyword">UNIQUE</span>(seat),</span><br><span class="line">	<span class="keyword">CHECK</span>(gender=<span class="string">&#x27;男&#x27;</span> <span class="keyword">OR</span> gender=<span class="string">&#x27;女&#x27;</span>),</span><br><span class="line">	<span class="keyword">FOREIGN</span> <span class="keyword">KEY</span>(major_id) <span class="keyword">REFERENCES</span> major(<span class="keyword">id</span>)</span><br><span class="line">);</span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">TABLE</span> <span class="keyword">IF</span> <span class="keyword">EXISTS</span> stu;</span><br><span class="line"></span><br><span class="line"><span class="comment">#通用的写法</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> <span class="keyword">IF</span> <span class="keyword">NOT</span> <span class="keyword">EXISTS</span> stuinfo(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span> PRIMARY <span class="keyword">KEY</span>,</span><br><span class="line">	stuname <span class="built_in">VARCHAR</span>(<span class="number">20</span>) <span class="keyword">NOT</span> <span class="literal">NULL</span>,</span><br><span class="line"><span class="comment">#	sex char(1),</span></span><br><span class="line">	age <span class="built_in">INT</span> <span class="keyword">DEFAULT</span> <span class="number">18</span>,</span><br><span class="line">	seat <span class="built_in">INT</span> <span class="keyword">UNIQUE</span>,</span><br><span class="line">	majorid <span class="built_in">INT</span>,</span><br><span class="line">	<span class="keyword">CONSTRAINT</span> fk_stuinfo_major <span class="keyword">FOREIGN</span> <span class="keyword">KEY</span>(majorid) <span class="keyword">REFERENCES</span> major(<span class="keyword">id</span>)</span><br><span class="line">		   <span class="comment">#fk_当前表名_主表名</span></span><br><span class="line">);</span><br><span class=
