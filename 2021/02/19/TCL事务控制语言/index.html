e">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#TCL 事务控制语言</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	Transcation Control Language 事务控制语言</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	事务：</span></span><br><span class="line"><span class="comment">		一个或一组sql语句组成一个执行单元，这个执行单元要么全部执行，</span></span><br><span class="line"><span class="comment">		要么全部不执行。</span></span><br><span class="line"><span class="comment">		如果单元中某条sql语句一旦执行失败或产生错误，整个单元将会回滚。所有</span></span><br><span class="line"><span class="comment">		受到影响的数据将返回到事务开始以前的状态。</span></span><br><span class="line"><span class="comment">	案例：转账</span></span><br><span class="line"><span class="comment">	e.g.</span></span><br><span class="line"><span class="comment">		</span></span><br><span class="line"><span class="comment">	张三丰	1000</span></span><br><span class="line"><span class="comment">	郭襄	1000</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	update 表 set 张三丰的余额=500 where name=&#x27;张三丰&#x27;</span></span><br><span class="line"><span class="comment">	update 表 set 郭襄的余额=1500 where name=&#x27;郭襄&#x27;</span></span><br><span class="line"><span class="comment">	事务的ACID（acid）属性</span></span><br><span class="line"><span class="comment">	1.原子性（Atomicity）</span></span><br><span class="line"><span class="comment">	    原子性是指事务是一个不可分割的工作单位，事务中的操作要么</span></span><br><span class="line"><span class="comment">	都发生，要么都不发生。</span></span><br><span class="line"><span class="comment">	2.一致性（Consistency）</span></span><br><span class="line"><span class="comment">	事务必须使数据库从一个一致性状态变换到另外一个一致性状态</span></span><br><span class="line"><span class="comment">	3.隔离性（Isolation）</span></span><br><span class="line"><span class="comment">	    事务的隔离性是指一个事务的执行不能被其他事务干扰，即一个</span></span><br><span class="line"><span class="comment">	事务内部的操作及使用的数据对并发的其他事物是隔离的，并发</span></span><br><span class="line"><span class="comment">	执行的各个事务之间不能互相干扰。</span></span><br><span class="line"><span class="comment">	4.持久性（Durability）</span></span><br><span class="line"><span class="comment">	    持久性是指一个事务一旦被提交，它对数据库中数据的改变就是</span></span><br><span class="line"><span class="comment">	永久性的，接下来的其他操作和数据库故障不应该对其有任何影响。</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	事务的创建</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	隐式事务：事务没有明显的开启和结束的标志</span></span><br><span class="line"><span class="comment">	比如：insert、update、delete语句</span></span><br><span class="line"><span class="comment">	显试事务：事务具有明显的开启和结束标志</span></span><br><span class="line"><span class="comment">	前提：必须先设置自动提交功能为禁用</span></span><br><span class="line"><span class="comment">	set autocommit=0;</span></span><br><span class="line"><span class="comment">	步骤一：开启事务</span></span><br><span class="line"><span class="comment">	set autocommit=0;</span></span><br><span class="line"><span class="comment">	start transaction;#可选的</span></span><br><span class="line"><span class="comment">	步骤二：编写事务中的sql语句（select inset update delete）</span></span><br><span class="line"><span class="comment">	语句1</span></span><br><span class="line"><span class="comment">	语句2</span></span><br><span class="line"><span class="comment">	...</span></span><br><span class="line"><span class="comment">	步骤三：结束事务</span></span><br><span class="line"><span class="comment">	commit;#提交事务</span></span><br><span class="line"><span class="comment">	rollback;#回滚事务</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	savepoint 节点名;#设置保存点, “rollback to 节点名”这样使用</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	事务的隔离级别：</span></span><br><span class="line"><span class="comment">			   脏读		不可重复读	幻读</span></span><br><span class="line"><span class="comment">	read uncommitted   √		√		√</span></span><br><span class="line"><span class="comment">	read committed	   ×		√		√</span></span><br><span class="line"><span class="comment">	repeatable read    ×		×		√</span></span><br><span class="line"><span class="comment">	serializable	   ×		×		×</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	存储引擎：不同的存储技术或表类型</span></span><br><span class="line"><span class="comment">	show engines 查看存储引擎</span></span><br><span class="line"><span class="comment">	innodb支持事务</span></span><br><span class="line"><span class="comment">	而myisam、memory不支持事务</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">SHOW</span> <span class="keyword">ENGINES</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SHOW</span> <span class="keyword">VARIABLES</span> <span class="keyword">LIKE</span> <span class="string">&#x27;autocommit&#x27;</span>;</span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">TABLE</span> <span class="keyword">IF</span> <span class="keyword">EXISTS</span> <span class="keyword">account</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">CREATE</span> <span class="keyword">TABLE</span> <span class="keyword">account</span>(</span><br><span class="line">	<span class="keyword">id</span> <span class="built_in">INT</span> PRIMARY <span class="keyword">KEY</span> AUTO_INCREMENT,</span><br><span class="line">	username <span class="built_in">VARCHAR</span>(<span class="number">20</span>),</span><br><span class="line">	balance <span class="keyword">DOUBLE</span></span><br><span class="line">);</span><br><span class="line"><span class="keyword">DROP</span> <span class="keyword">TABLE</span> <span class="keyword">account</span>;</span><br><span class="line"><span class="keyword">INSERT</span> <span class="keyword">INTO</span> <span class="keyword">account</span>(username,balance)</span><br><span class="line"><span class="keyword">VALUES</span>(<span class="string">&#x27;zwj&#x27;</span>,<span class="number">1000</span>),(<span class="string">&#x27;zm&#x27;</span>,<span class="number">1000</span>);</span><br><span class="line"><span class="comment">#1.演示事务的使用步骤</span></span><br><span class="line"><span class="comment">#开启事务</span></span><br><span class="line"><span class="keyword">SET</span> autocommit=<span class="number">0</span>;</span><br><span class="line"><span class="keyword">START</span> <span class="keyword">TRANSACTION</span>;</span><br><span class="line"><span class="comment">#编写一组事务的语句</span></span><br><span class="line"><span class="keyword">UPDATE</span> <span class="keyword">account</span> <span class="keyword">SET</span> balance = <span class="number">500</span> <span class="keyword">WHERE</span> username=<span class="string">&#x27;zwj&#x27;</span>;</span><br><span class="line"><span class="keyword">UPDATE</span> <span class="keyword">account</span> <span class="keyword">SET</span> balance = <span class="number">1500</span> <span class="keyword">WHERE</span> username=<span class="string">&#x27;zm&#x27;</span>;</span><br><span class="line"><span class="comment">#结束事务</span></span><br><span class="line"><span class="comment">#commit;</span></span><br><span class="line"><span class="keyword">ROLLBACK</span>;</span><br><span class="line"><span class="comment">#2021.02.18回滚失败</span></span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> <span class="keyword">account</span>;</span><br><span class="line"><span class="comment">#2021.02.19问题解决！</span></span><br><span class="line"><span class="comment">/*查询innodb开了没有 原文链接：https://blog.csdn.net/dengwenjieyear/article/details/78582164</span></span><br><span class="line"><span class="comment">SHOW VARIABLES LIKE &#x27;have_%&#x27;</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#2.演示事务对于delete和truncate的处理的区别</span></span><br><span class="line"><span class="comment">#delete</span></span><br><span class="line"><span class="keyword">SET</span> autocommit = <span class="number">0</span>;</span><br><span class="line"><span class="keyword">START</span> <span class="keyword">TRANSACTION</span>;</span><br><span class="line"><span class="keyword">DELETE</span> <span class="keyword">FROM</span> <span class="keyword">account</span>;</span><br><span class="line"><span class="keyword">ROLLBACK</span>;</span><br><span class="line"><span class="comment">#truncate</span></span><br><span class="line"><span class="keyword">SET</span> autocommit = <span class="number">0</span>;</span><br><span class="line"><span class="keyword">START</span> <span class="keyword">TRANSACTION</span>;</span><br><span class="line"><span class="keyword">TRUNCATE</span> <span class="keyword">TABLE</span> <span class="keyword">account</span>;</span><br><span class="line"><span class="keyword">ROLLBACK</span>;<span class="comment">#数据仍然被删除，即truncate不支持回滚</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">#3.演示savepoint的使用</span></span><br><span class="line"><span class="keyword">SET</span> autocommit=<span class="number">0</span>;</span><br><span class="line"><span class="keyword">START</span> <span class="keyword">TRANSACTION</span>;</span><br><span class="line"><span class="keyword">DELETE</span> <span class="keyword">FROM</span> <span class="keyword">account</span> <span class="keyword">WHERE</span> <span class="keyword">id</span> = <span class="number">1</span>;</span><br><span class="line"><span class="keyword">SAVEPOINT</span> a;<span class="comment">#设置保存点</span></span><br><span class="line"><span class="keyword">DELETE</span> <span class="keyword">FROM</span> <span class="keyword">account</span> <span class="keyword">WHERE</span> <span class="keyword">id</span> = <span class="number">2</span>;</span><br><span class="line"><span class="keyword">ROLLBACK</span> <span class="keyword">TO</span> a;</span><br><span class="line"></span><br><span class="line"><span class="keyword">SELECT</span> * <span class="keyword">FROM</span> <span class="keyword">account</span>;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
